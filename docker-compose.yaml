services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-roomdb}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  test-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: test_mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d test_mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build: .
    restart: always
    ports:
      - "8080:8080"
    volumes:
    - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-roomdb}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-supersecretkey}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file:
      - .test.env
    environment:
      DB_HOST: test-db
      DB_PORT: 5432
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: test_mydatabase
      JWT_SECRET_KEY: test_secret_key_change_me_in_production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      test-db:
        condition: service_healthy
      app:
        condition: service_started
    command: ["pytest", "-v", "--tb=short", "--disable-warnings"]
    networks:
      - app-network
    profiles:
      - test

volumes:
  db_data:

networks:
  app-network:
    driver: bridge